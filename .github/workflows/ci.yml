name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: url_shortener
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build with Maven (Backend)
      run: |
        cd backend
        ./mvnw clean package -DskipTests

    - name: Build with Vite (Frontend)
      run: |
        cd frontend
        npm install
        npm run build

    - name: Run Backend Tests
      env:
        DB_URL: jdbc:mysql://localhost:3306/url_shortener?useSSL=false&serverTimezone=UTC
        DB_USERNAME: root
        DB_PASSWORD: password
        GEMINI_API_KEY: fake-test-key
      run: |
        cd backend
        ./mvnw test
