version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: url_shortener_db
    environment:
      MYSQL_ROOT_PASSWORD: luffy
      MYSQL_DATABASE: url_shortener_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Configured to mimic a horizontally scaled Redis environment
  redis-primary:
    image: redis:7.2
    container_name: url_shortener_redis_primary
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_primary_data:/data

  redis-replica-1:
    image: redis:7.2
    container_name: url_shortener_redis_replica_1
    command: redis-server --replicaof redis-primary 6379
    depends_on:
      - redis-primary

  redis-replica-2:
    image: redis:7.2
    container_name: url_shortener_redis_replica_2
    command: redis-server --replicaof redis-primary 6379
    depends_on:
      - redis-primary

volumes:
  mysql_data:
  redis_primary_data:
